media:
  input: public/media
  output: /media
  rename: safe
  categories: [image, document]

content:
  - name: home
    label: トップページ
    type: file
    path: index.md
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    fields:
      - name: layout
        type: string
        hidden: true
      - name: hero
        label: ヒーロー
        type: object
        fields:
          - name: name
            label: サービス名
            type: string
            required: true
          - name: text
            label: 見出し
            type: string
            required: true
          - name: tagline
            label: 説明文
            type: text
          - name: actions
            label: ボタン
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{text}"
            fields:
              - name: theme
                label: 種類
                type: select
                options:
                  values: [brand, alt]
              - name: text
                label: テキスト
                type: string
              - name: link
                label: リンク
                type: string
      - name: features
        label: 特徴
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - name: title
            label: タイトル
            type: string
            required: true
          - name: details
            label: 詳細
            type: text

  - name: setup
    label: はじめての設定
    type: file
    path: setup/index.md
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    fields: &markdown_page_fields
      - name: outline
        label: 目次の深さ
        type: select
        options:
          values: [deep, false]
      - name: body
        label: 本文
        type: code
        options:
          format: markdown

  - name: manual_index
    label: マニュアル一覧
    type: file
    path: manual/index.md
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    fields: *markdown_page_fields

  - name: manual_products
    label: 商品設定
    type: file
    path: manual/products.md
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    fields: *markdown_page_fields

  - name: manual_theme
    label: テーマ設定
    type: file
    path: manual/theme.md
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    fields: *markdown_page_fields

  - name: manual_shipping_page
    label: 受取ページ設定
    type: file
    path: manual/shipping-page.md
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    fields: *markdown_page_fields

  - name: manual_notification_email
    label: 通知メール設定
    type: file
    path: manual/notification-email.md
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    fields: *markdown_page_fields

  - name: manual_order_management
    label: 注文管理
    type: file
    path: manual/order-management.md
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    fields: *markdown_page_fields

  - name: help_index
    label: ヘルプ
    type: file
    path: help/index.md
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    fields: *markdown_page_fields

  - name: help_faq
    label: FAQ
    type: file
    path: help/faq.md
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    fields: *markdown_page_fields

  - name: help_troubleshooting
    label: トラブルシューティング
    type: file
    path: help/troubleshooting.md
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    fields: *markdown_page_fields

  - name: contact
    label: お問い合わせ
    type: file
    path: contact.md
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    fields: *markdown_page_fields

  - name: privacy_policy
    label: プライバシーポリシー
    type: file
    path: privacy-policy.md
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    fields: *markdown_page_fields

  - name: terms
    label: 利用規約
    type: file
    path: terms.md
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    fields: *markdown_page_fields

settings:
  commit:
    templates:
      create: "docs: create {name}"
      update: "docs: update {name}"
      delete: "docs: delete {name}"
